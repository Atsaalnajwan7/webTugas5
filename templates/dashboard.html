<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Analisis Sentimen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .dashboard-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-card">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 Home</a>
                <a href="/dashboard" class="nav-link">📊 Dashboard</a>
                <a href="/about" class="nav-link">ℹ️ About</a>
            </div>
            
            <h2 class="text-center mb-4">📊 Dashboard Analisis Sentimen</h2>
            
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <h3 id="total">-</h3>
                        <p>Total Komentar</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #28a745, #20c997);">
                        <h3 id="positif">-</h3>
                        <p>Positif</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #ffc107, #fd7e14);">
                        <h3 id="netral">-</h3>
                        <p>Netral</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #dc3545, #e83e8c);">
                        <h3 id="negatif">-</h3>
                        <p>Negatif</p>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="col-md-6">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            document.getElementById('total').innerText = data.total;
            document.getElementById('positif').innerText = data.positif;
            document.getElementById('netral').innerText = data.netral;
            document.getElementById('negatif').innerText = data.negatif;
            
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: ['Positif', 'Netral', 'Negatif'],
                    datasets: [{
                        label: 'Jumlah Komentar',
                        data: [data.positif, data.netral, data.negatif],
                        backgroundColor: ['#28a745', '#ffc107', '#dc3545']
                    }]
                }
            });
            
            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: ['Positif', 'Netral', 'Negatif'],
                    datasets: [{
                        data: [data.positif_persen, data.netral_persen, data.negatif_persen],
                        backgroundColor: ['#28a745', '#ffc107', '#dc3545']
                    }]
                }
            });
        }
        loadStats();
    </script>
</body>
</html>
